# Public developer demo mod.
id=demo
outputName=demo
publish=true

# Target engine: none / unity / unreal.
engine=none

# Entry type: mod / jni.
entry=mod

# Optional integration switches.
enableUnityMain=false
enableUnityLoader=false
enableLibraryRedirect=false
enableEncryptedPayload=false
enableVfs=false

# Auth provider: none / wy.
auth=none

# Debug builds may carry diagnostic helper libraries.
debug.extraLibs=libnyx_test_probe.so,libshadowhook.so,libshadowhook_nothing.so

# Release builds should only publish the active mod output library.
release.libs=libdemo.so
